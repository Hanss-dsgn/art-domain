<section class="auth-page">

  <div class="auth-left">
    <form (ngSubmit)="login()">

      <h1>Welcome Back</h1>
      <p>Sign in to continue your museum journey</p>

       <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
        required
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      />


       <button type="submit">LOGIN</button>


      <p class="switch-link">
        Don’t have an account?
        <a routerLink="/register">Register</a>
      </p>
    </form>
  </div>

  <div class="auth-right"></div>

</section>
